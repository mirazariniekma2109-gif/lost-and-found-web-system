services:
  # 1. Web Server & Laravel App
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lostandfound-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:80"
    depends_on:
      - mysql
    networks:
      - laravel-network

  # 2. Composer (Untuk install library)
  composer:
    image: composer:latest
    container_name: lostandfound-composer
    volumes:
      - .:/app
    working_dir: /app
    networks:
      - laravel-network

  # 3. Database MySQL
  mysql:
    image: mysql:8.0
    container_name: lostandfound-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lostandfound
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network

  # 4. Database Manager (UI)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: lostandfound-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: secret
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata: